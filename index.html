<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OS OpenInSider</title>

<!-- PWA Android -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="OS">
<meta name="theme-color" content="#ffcc00">

<!-- PWA iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OS">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #ffcc00, #dba800);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 18px;
  font-family: system-ui, sans-serif;
}
.icon {
  width: 100px; height: 100px;
  background: linear-gradient(160deg, #ffcc00, #dba800);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  font-size: 3rem; font-weight: 900;
  color: #0f0f0f; letter-spacing: -2px;
}
h1 { font-size: 1.6rem; font-weight: 800; color: #0f0f0f; letter-spacing: -1px; }
.sub { font-size: 0.82rem; color: rgba(0,0,0,0.5); }

/* Box istruzioni installa */
.install-box {
  background: rgba(0,0,0,0.12);
  border-radius: 16px;
  padding: 14px 20px;
  max-width: 280px;
  text-align: center;
}
.install-box .step {
  font-size: 0.82rem;
  color: #0f0f0f;
  line-height: 1.6;
}
.install-box .step b { font-weight: 800; }

/* Countdown ring */
.ring-wrap {
  position: relative;
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
}
.ring-wrap svg {
  position: absolute; top: 0; left: 0;
  transform: rotate(-90deg);
}
.ring-bg { fill: none; stroke: rgba(0,0,0,0.15); stroke-width: 5; }
.ring-fg {
  fill: none; stroke: #0f0f0f; stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 176;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}
.countdown-num {
  font-size: 1.4rem; font-weight: 800; color: #0f0f0f;
  position: relative; z-index: 1;
}

/* Pulsante manuale */
.btn-open {
  margin-top: 4px;
  background: #0f0f0f;
  color: #ffcc00;
  border: none;
  border-radius: 14px;
  padding: 13px 32px;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: -0.3px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.btn-open:active { transform: scale(0.97); }
</style>
</head>
<body>
  <div class="icon">OS</div>
  <h1>OS OpenInSider</h1>
  <p class="sub">OpenInSider &middot; C-Level Purchases</p>

  <!-- Istruzioni installazione -->
  <div class="install-box">
    <div class="step">
      📲 <b>Installa l'app ora:</b><br>
      Menu <b>⋮</b> in alto a destra<br>
      → <b>"Aggiungi a schermata Home"</b><br>
      → conferma <b>"Aggiungi"</b>
    </div>
  </div>

  <!-- Countdown visivo -->
  <div class="ring-wrap">
    <svg viewBox="0 0 64 64" width="64" height="64">
      <circle class="ring-bg" cx="32" cy="32" r="28"/>
      <circle class="ring-fg" id="ring" cx="32" cy="32" r="28"/>
    </svg>
    <span class="countdown-num" id="num">15</span>
  </div>

  <!-- Pulsante per chi vuole aprire subito -->
  <button class="btn-open" onclick="goNow()">Apri l'app →</button>

  <script>
    var dest = 'https://insider-tracker-3pv8nsbqmjeofpk2mww8kj.streamlit.app';
    var total = 15;
    var left  = total;
    var circ  = 2 * Math.PI * 28; // ~175.9

    function goNow() {
      window.location.href = dest;
    }

    var ring = document.getElementById('ring');
    var num  = document.getElementById('num');

    ring.style.strokeDasharray  = circ;
    ring.style.strokeDashoffset = 0;

    var timer = setInterval(function() {
      left--;
      num.textContent = left;
      // Offset cresce da 0 a circ man mano che il tempo passa
      ring.style.strokeDashoffset = circ * (1 - left / total);
      if (left <= 0) {
        clearInterval(timer);
        goNow();
      }
    }, 1000);
  </script>
</body>
</html>
